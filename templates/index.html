<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196f3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>Guarda Chat App</title>
    <link rel="manifest" href="/static/manifest.json" />
    <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        #chat {
            width: 100%;
            max-width: 700px;
            height: 70vh;
            display: flex;
            flex-direction: column;
            background: #f0f0f0;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
            margin-bottom: 60px; /* Espaço extra para o footer */
        }

        #title {
            background: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 20px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        #messages {
            flex: 3;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            max-height: 60vh;
        }

        #userList {
            flex: 1;
            background: #ffffff;
            border-left: 1px solid #ccc;
            padding: 10px;
            font-size: 12px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .message {
            max-width: 70%;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }

        .me {
            align-self: flex-end;
            background-color: #dcf8c6;
            border-bottom-right-radius: 0;
        }

        .other {
            align-self: flex-start;
            background-color: white;
            border-bottom-left-radius: 0;
        }

        .info {
            font-size: 10px;
            color: gray;
            margin-top: 5px;
            text-align: right;
        }

        #inputContainer {
            display: flex;
            padding: 10px;
            background: #ffffff;
            border-top: 1px solid #ddd;
        }

        input, button {
            padding: 10px;
            font-size: 16px;
        }

        input {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding-left: 15px;
        }

        button {
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            background-color: #4CAF50;
            color: white;
        }

        #nameInputContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #nameInputBox {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        #footer {
            text-align: center;
            font-size: 12px;
            color: #555;
            width: 100%;
            margin-top: auto;
            padding: 10px 0;
            background: transparent;
            position: relative;
        }

        @media (max-width: 600px) {
            #chat {
                flex-direction: column;
                margin-bottom: 80px; /* Mais espaço ainda no mobile */
            }

            #userList {
                display: none;
            }

            #footer {
                position: fixed;
                bottom: 0;
                background: #e5ddd5;
            }
        }
    </style>
</head>
<body>

<div id="nameInputContainer">
    <div id="nameInputBox">
        <h2>Qual seu nome, My Consagrated?</h2>
        <input type="text" id="nameInput" placeholder="Digite seu nome aqui, My Consagrated..." />
        <button onclick="setName()">Entrar</button>
    </div>
</div>

<div id="chat" style="display: none; flex-direction: column;">
    <div id="title">Guarda Chat App</div>
    <div style="display: flex; flex: 1;">
        <div id="messages"></div>
        <div id="userList"></div>
    </div>
    <div id="inputContainer">
        <input type="text" id="messageInput" placeholder="Digite sua mensagem aqui, My Consagrated..." />
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<audio id="notificationSound" src="{{ url_for('static', filename='sounds/arpeggio-467.mp3') }}" preload="auto"></audio>


<div id="footer">
    <p>a Jhonny Clayton Guarda production</p>
    <p>Guarda Chat App © 2025</p>
</div>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyAGkxSC0X29UoQLfi0asIEiqtRVsuo_9I0",
    authDomain: "guarda-chat-app-fde73.firebaseapp.com",
    projectId: "guarda-chat-app-fde73",
    storageBucket: "guarda-chat-app-fde73.firebasestorage.app",
    messagingSenderId: "566174764881",
    appId: "1:566174764881:web:e0288bf090f018396c8d70",
    measurementId: "G-3CP6L65Z3W"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>


<script>
    const socket = io();
    let nome = localStorage.getItem('chat_nome') || '';
    const messagesDiv = document.getElementById('messages');
    const userListDiv = document.getElementById('userList');

    function setName() {
        const input = document.getElementById('nameInput');
        const value = input.value.trim();
        if (value) {
            nome = value;
            localStorage.setItem('chat_nome', nome);
            document.getElementById('nameInputContainer').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            socket.emit('user_online', nome);
            requestMessages();
        }
    }

    function requestMessages() {
        socket.emit('request_messages');
    }

    function getLocalTime(dateStr) {
        return dateStr;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const mensagem = input.value.trim();
        if (mensagem) {
            const horario = new Date().toLocaleString('pt-BR', { hour12: false });
            const messageData = {
                nome,
                mensagem,
                horario
            };
            socket.emit('message', messageData);
            input.value = '';
            displayMessage(messageData);
        }
    }

    function displayMessage(data) {
        const messageEl = document.createElement('div');
        messageEl.classList.add('message', data.nome === nome ? 'me' : 'other');
        messageEl.innerHTML = `<strong>${data.nome}</strong><br>${data.mensagem}<div class="info">${getLocalTime(data.horario)}</div>`;
        messagesDiv.appendChild(messageEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    socket.on('response', data => {
        if (data.nome !== nome) {
            displayMessage(data);
            document.getElementById('notificationSound').play();
            if (Notification.permission === "granted") {
                new Notification(`${data.nome}: ${data.mensagem}`);
            }
        }
    });

    socket.on('load_messages', mensagens => {
        messagesDiv.innerHTML = '';
        mensagens.forEach(displayMessage);
    });

    socket.on('user_list', list => {
        let html = '<strong>Usuários:</strong><ul>';
        list.forEach(u => {
            if (u.online) {
                html += `<li>${u.nome} <span style="color: green;">(online)</span></li>`;
            } else {
                html += `<li>${u.nome} <span style="color: gray;">(últ. vez online: ${getLocalTime(u.lastSeen)})</span></li>`;
            }
        });
        html += '</ul>';
        userListDiv.innerHTML = html;
    });

    window.onload = () => {
        if (nome) {
            document.getElementById('nameInputContainer').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            socket.emit('user_online', nome);
            requestMessages();
        }
    };

    document.getElementById('messageInput').addEventListener('keydown', event => {
        if (event.key === 'Enter') {
            event.preventDefault();
            sendMessage();
        }
    });

    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/static/service-worker.js').then(function (registration) {
        console.log('ServiceWorker registrado com sucesso: ', registration.scope);
      }).catch(function (error) {
        console.log('Falha ao registrar o ServiceWorker: ', error);
      });
    });
  }
</script>


</body>
</html>
